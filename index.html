<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quack Attack feat. the Posture Police</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <h1>Quack Attack</h1>
        <p id="subtitle">The Duck-Powered Device feat. The Posture Police</p>

        <div id="webcam-container">
            <video id="webcam" autoplay playsinline></video>
            <canvas id="overlay"></canvas>
        </div>

        <div id="controls">
            <button id="calibrate-btn" disabled>Calibrate Posture</button>
            <p id="status">Loading the AI model...</p>
        </div>
    
        <div id="duck-zone"></div>
    </div>
    <audio id="quack-sound" src="assets/quack.mp3" preload="auto">
    </audio>
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@2.1.3"></script>

    <script src="app.js"></script>
</body>
</html>
